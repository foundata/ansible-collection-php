# Uninstall: Manage basic resource removal, such as packages or service users.

---

# The role enumerates every SAPI + extension package it could have installed so
# the absent state cleans up regardless of variable choices:
# __run_php_packages_uninstall is the union of every SAPI and every extension
# package the role knows about on this platform, not just those that the current
# variable set asked to install. That makes the uninstall path symmetric and
# robust regardless of how run_php_sapis / run_php_extensions_enabled happen to
# be set at removal time.
#
# On Fedora 43/44 the dnf5 backend handles missing-on-absent fine in isolation,
# but mixing missing entries with installed ones triggers an unrelated
# depsolve cascade ("php-pdo / php-common: conflicting requests"). So we filter
# the uninstall list to only packages actually present on the host before
# handing it to the package module to prevent this error.

- name: "Setup | Uninstall | Install python3-rpm on Red Hat and SUSE (and python3-libdnf5 on Fedora) for package_facts"
  ansible.builtin.package:
    name: >-
      {{
        ['python3-rpm']
        + (['python3-libdnf5']
           if (ansible_facts['distribution'] | ansible.builtin.lower) == 'fedora'
           else [])
      }}
    state: "present"
  when:
    - (ansible_facts['os_family'] | ansible.builtin.lower) in ['redhat', 'suse']


- name: "Setup | Uninstall | Gather package facts to determine which managed packages are actually installed"
  ansible.builtin.package_facts:
    manager: "auto"


- name: "Setup | Uninstall | Remove packages (filtered to those actually installed)"
  ansible.builtin.package:
    name: "{{ __run_php_packages_uninstall_installed }}"
    state: "absent"
  vars:
    __run_php_packages_uninstall_installed: >-
      {{
        (__run_php_packages_uninstall | ansible.builtin.default([]))
        | ansible.builtin.select('in', ansible_facts['packages'].keys())
        | ansible.builtin.list
      }}
  when:
    - __run_php_packages_uninstall is ansible.builtin.defined
    - (__run_php_packages_uninstall_installed | ansible.builtin.length) > 0
