# Internal role variables specific to: Ubuntu 26 (distribution_major_version)
#
# Only values specific to the platform and its functionality should be included
# here. Variables in this file override those defined in vars/debian.yml
# (Ubuntu's os_family is "Debian").

---

# Ubuntu 26.04 LTS (Resolute Raccoon) ships PHP 8.5 in main universe.
__run_php_version_distribution_default: "8.5"


# Starting with PHP 8.5 the standalone php<ver>-opcache package is gone and
# OPcache is compiled into the base PHP packages. The mods-available/ entry
# for opcache is also gone in this packaging. Override the role's extension
# map so it does not try to install the now-nonexistent package, and treat
# opcache as a builtin so it stays accepted in run_php_extensions_enabled
# and in run_php_extension_settings.shared.opcache.
__run_php_extensions_map_resources_overwrite:
  opcache:
    packages: []

__run_php_extensions_builtin_overwrite:
  - "opcache"
